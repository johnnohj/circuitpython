<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CircuitPython WASM</title>
<style>
body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #e0e0e0; }
canvas { border: 1px solid #444; image-rendering: pixelated; }
#status { margin: 8px; font-size: 12px; color: #888; }
#serial { width: 480px; height: 120px; background: #111; color: #0f0; border: 1px solid #444; padding: 4px; font-size: 12px; font-family: monospace; overflow-y: scroll; white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>
<canvas id="display" width="480" height="360"></canvas>
<div id="status">Loading...</div>
<div id="serial"></div>

<script type="module">
import { WasiMemfs, IdbBackend, seedDrive } from './js/wasi-memfs.js';
import { Semihosting } from './js/semihosting.js';
import { env } from './js/env.js';
import { Fwip } from './js/fwip.js';

const canvas = document.getElementById('display');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const serialDiv = document.getElementById('serial');

// Serial output buffer — strip VT100/ANSI escape sequences
// (cursor positioning, color, erase) that the serial div can't render.
const ANSI_RE = /\x1b\[[0-9;]*[A-Za-z]|\x1b\][^\x07]*\x07|\x1b\[[\?]?[0-9;]*[hlm]/g;
let serialText = '';
function appendSerial(text) {
    serialText += text.replace(ANSI_RE, '');
    serialDiv.textContent = serialText;
    serialDiv.scrollTop = serialDiv.scrollHeight;
}

// Semihosting handler — JS side of the back door
const sh = new Semihosting();
sh.onDebugLog = (level, msg) => {
    const fn = [console.log, console.warn, console.error][level] || console.log;
    fn(`[cp] ${msg}`);
};

// IndexedDB persistence for CIRCUITPY drive
const idb = new IdbBackend();

// Create WASI runtime with /hal/ and /sys/ interception
const wasi = new WasiMemfs({
    args: ['circuitpython'],
    idb,
    onStdout: (text) => appendSerial(text),
    onStderr: (text) => console.log('[stderr]', text),
    onHardwareWrite: (path, data) => {
        if (!path.startsWith('/hal/serial')) {
            console.log('[hal write]', path, data.length, 'bytes');
        }
    },
    onSyscall: (callBuf) => sh.handleCall(callBuf),
});

// Wire semihosting to MEMFS (deferred binding — MEMFS created first)
sh.setMemfs(wasi);

async function main() {
    status.textContent = 'Loading filesystem...';

    // Restore persisted CIRCUITPY files from IndexedDB
    const restored = await idb.load(wasi);
    console.log(`[idb] restored ${restored} files`);

    // Seed CIRCUITPY drive structure (only creates files that don't exist)
    seedDrive(wasi, {
        codePy: 'print("Hello from CircuitPython WASM!")\n',
    });

    // Seed test scripts for ctx run
    const enc = new TextEncoder();
    if (!wasi.files.has('/CIRCUITPY/ticker.py')) {
        wasi.writeFile('/CIRCUITPY/ticker.py', enc.encode(
            'import time\nwhile True:\n    time.sleep(2)\n    print("tick")\n'
        ));
    }

    status.textContent = 'Compiling...';

    const response = await fetch('build-browser/circuitpython.wasm');
    const bytes = await response.arrayBuffer();
    const module = await WebAssembly.compile(bytes);
    const instance = await WebAssembly.instantiate(module, wasi.getImports());
    wasi.setInstance(instance);
    sh.setInstance(instance);

    const exports = instance.exports;
    status.textContent = 'Initializing...';

    // Initialize the supervisor (opens /hal/ and /sys/ endpoints)
    exports.cp_init();

    // Framebuffer info — read once at init (static), then use
    // direct memory addresses for per-frame dirty checking.
    const fbAddr = exports.wasm_display_fb_addr();
    const fbWidth = exports.wasm_display_fb_width();
    const fbHeight = exports.wasm_display_fb_height();
    const cursorInfoAddr = exports.wasm_cursor_info_addr();
    const imageData = ctx.createImageData(fbWidth, fbHeight);

    // Scale canvas to match displayio group scale
    canvas.style.width = fbWidth + 'px';
    canvas.style.height = fbHeight + 'px';

    status.textContent = `Running (${fbWidth}x${fbHeight} display)`;

    // fwip — firmware package installer (JS-native, no C round-trip)
    //   From REPL: fwip neopixel
    //   From console: await fwip.install('neopixel')
    const fwip = new Fwip(wasi, {
        log: (msg) => { console.log(msg); appendSerial(msg + '\n'); },
        exports,
    });
    window.fwip = fwip;

    // ── JS-side readline ──
    // JS owns input accumulation.  When Enter is pressed, the
    // complete expression is written to the shared input buffer
    // and cp_exec(len) is called.  No pyexec, no rx_buf.
    const inputBufAddr = exports.cp_input_buf_addr();
    const inputBufSize = exports.cp_input_buf_size();
    let inputLine = '';
    let inputLines = '';   // accumulated multi-line input
    let inputHistory = [];
    let historyIdx = -1;
    let waitingForResult = true;   // true after cp_exec or at boot, cleared on prompt
    const PS1 = '>>> ';
    const PS2 = '... ';

    function writeInputBuf(text) {
        const enc = new TextEncoder();
        const bytes = enc.encode(text);
        const len = Math.min(bytes.length, inputBufSize - 1);
        new Uint8Array(exports.memory.buffer, inputBufAddr, len).set(bytes.subarray(0, len));
        return len;
    }

    // Write text through C's mp_hal_stdout so it appears on both
    // the serial div (via onStdout) and the displayio canvas.
    function termWrite(text) {
        const len = writeInputBuf(text);
        if (len > 0) {
            exports.cp_print(len);
        }
    }

    function showPrompt() {
        const prompt = inputLines ? PS2 : PS1;
        termWrite(prompt);
    }

    // ── Shell commands ──
    // Intercept lines that match shell builtins before they reach cp_exec.
    // Returns true if the line was handled.
    function tryShellCommand(line) {
        const trimmed = line.trim();
        if (!trimmed) return false;

        const parts = trimmed.split(/\s+/);

        // ── ctx — context management ──
        if (parts[0] === 'ctx') {
            const sub = parts[1] || 'help';

            if (sub === 'run') {
                const code = trimmed.slice(trimmed.indexOf('run') + 4);
                if (!code.trim()) {
                    termWrite('Usage: ctx run <python code>\r\n');
                    showPrompt();
                    return true;
                }
                const len = writeInputBuf(code);
                const id = exports.cp_context_exec(len, 200);
                if (id >= 0) {
                    termWrite(`[ctx] started context ${id}\r\n`);
                } else if (id === -1) {
                    termWrite('[ctx] error: no free context slots\r\n');
                } else {
                    termWrite('[ctx] error: compile failed\r\n');
                }
                showPrompt();
                return true;
            }

            if (sub === 'file') {
                const path = parts[2];
                if (!path) {
                    termWrite('Usage: ctx file <path>\r\n');
                    showPrompt();
                    return true;
                }
                const len = writeInputBuf(path);
                const id = exports.cp_context_exec_file(len, 200);
                if (id >= 0) {
                    termWrite(`[ctx] started context ${id} from ${path}\r\n`);
                } else if (id === -1) {
                    termWrite('[ctx] error: no free context slots\r\n');
                } else {
                    termWrite(`[ctx] error: compile failed for ${path}\r\n`);
                }
                showPrompt();
                return true;
            }

            if (sub === 'list') {
                let found = false;
                for (let i = 0; i < ctxMax; i++) {
                    const m = readContextMeta(i);
                    if (m && m.status > 0) {
                        termWrite(`  ctx ${i}: ${CTX_STATUSES[m.status]} pri=${m.priority}\r\n`);
                        found = true;
                    }
                }
                if (!found) termWrite('  No active contexts.\r\n');
                showPrompt();
                return true;
            }

            if (sub === 'kill') {
                const id = parseInt(parts[2]);
                if (id > 0 && id < ctxMax) {
                    exports.cp_context_destroy(id);
                    termWrite(`[ctx] killed context ${id}\r\n`);
                } else {
                    termWrite('Usage: ctx kill <id>  (id > 0)\r\n');
                }
                showPrompt();
                return true;
            }

            // help
            termWrite('ctx — execution context manager\r\n');
            termWrite('  ctx run <code>       run code in background context\r\n');
            termWrite('  ctx file <path>      run .py file in background context\r\n');
            termWrite('  ctx list             list active contexts\r\n');
            termWrite('  ctx kill <id>        destroy a context\r\n');
            showPrompt();
            return true;
        }

        if (parts[0] !== 'fwip') return false;

        // Parse flags: --py
        const flags = new Set(parts.filter(p => p.startsWith('--')));
        const words = parts.filter(p => !p.startsWith('--'));
        const usePy = flags.has('--py');
        const sub = words[1] || 'help';
        const args = words.slice(2);

        // fwip install <name> [--py]  /  fwip <name> [--py]
        if (sub === 'install' || (!['remove', 'list', 'freeze', 'frozen', 'help', '-r'].includes(sub))) {
            const name = sub === 'install' ? args[0] : sub;
            if (!name) {
                termWrite('Usage: fwip install <package> [--py]\r\n');
                showPrompt();
                return true;
            }
            const kind = usePy ? ' (source)' : '';
            termWrite(`[fwip] installing ${name}${kind}...\r\n`);
            fwip.install(name, { py: usePy }).then((info) => {
                if (info) {
                    termWrite(`[fwip] installed ${info.name}@${info.version} (${info.files.length} file${info.files.length === 1 ? '' : 's'})\r\n`);
                }
                showPrompt();
            }).catch((err) => {
                termWrite(`[fwip] error: ${err.message}\r\n`);
                showPrompt();
            });
            return true;
        }

        // fwip -r [--py]  — install from requirements.txt
        if (sub === '-r') {
            termWrite('[fwip] installing from requirements.txt...\r\n');
            fwip.installRequirements({ py: usePy }).then(() => {
                showPrompt();
            }).catch((err) => {
                termWrite(`[fwip] error: ${err.message}\r\n`);
                showPrompt();
            });
            return true;
        }

        // fwip freeze  — write requirements.txt
        if (sub === 'freeze') {
            try {
                const lines = fwip.freeze();
                for (const l of lines) {
                    termWrite(`  ${l}\r\n`);
                }
            } catch (err) {
                termWrite(`[fwip] error: ${err.message}\r\n`);
            }
            showPrompt();
            return true;
        }

        // fwip remove <name>
        if (sub === 'remove') {
            const name = args[0];
            if (!name) {
                termWrite('Usage: fwip remove <package>\r\n');
                showPrompt();
                return true;
            }
            try {
                fwip.remove(name);
                termWrite(`[fwip] removed ${name}\r\n`);
            } catch (err) {
                termWrite(`[fwip] error: ${err.message}\r\n`);
            }
            showPrompt();
            return true;
        }

        // fwip frozen  — list frozen modules
        if (sub === 'frozen') {
            const frozen = fwip._getFrozenModules();
            if (frozen.size === 0) {
                termWrite('No frozen modules detected.\r\n');
            } else {
                const sorted = [...frozen].sort();
                for (const m of sorted) {
                    termWrite(`  ${m} (frozen)\r\n`);
                }
            }
            showPrompt();
            return true;
        }

        // fwip list
        if (sub === 'list') {
            const pkgs = fwip.list();
            if (pkgs.length === 0) {
                termWrite('No packages installed.\r\n');
            } else {
                for (const pkg of pkgs) {
                    termWrite(`  ${pkg.module} (${pkg.version})\r\n`);
                }
            }
            showPrompt();
            return true;
        }

        // help
        termWrite('fwip — firmware package installer\r\n');
        termWrite('  fwip <package>           install a package\r\n');
        termWrite('  fwip install <pkg> [--py] install (--py for source)\r\n');
        termWrite('  fwip remove <package>    remove a package\r\n');
        termWrite('  fwip list                list installed packages\r\n');
        termWrite('  fwip freeze              write requirements.txt\r\n');
        termWrite('  fwip frozen              list frozen (built-in) modules\r\n');
        termWrite('  fwip -r [--py]           install from requirements.txt\r\n');
        showPrompt();
        return true;
    }

    document.addEventListener('keydown', (e) => {
        // Ctrl+C — interrupt running expression
        if (e.ctrlKey && e.key === 'c') {
            e.preventDefault();
            exports.cp_ctrl_c();
            if (inputLine || inputLines) {
                termWrite('^C\r\n');
                inputLine = '';
                inputLines = '';
                showPrompt();
            }
            return;
        }

        // Ctrl+D — soft reboot
        if (e.ctrlKey && e.key === 'd') {
            e.preventDefault();
            if (!inputLine && !inputLines) {
                exports.cp_ctrl_d();
                termWrite('\r\n');
            }
            return;
        }

        // Enter — submit line or continue multi-line
        if (e.key === 'Enter') {
            e.preventDefault();
            termWrite('\r\n');

            // Shell command interception — before the VM sees it
            if (!inputLines && tryShellCommand(inputLine)) {
                if (inputLine.trim()) {
                    inputHistory.unshift(inputLine.trimEnd());
                }
                inputLine = '';
                historyIdx = -1;
                return;
            }

            const fullInput = inputLines ? inputLines + inputLine + '\n' : inputLine;

            if (inputLine === '' && inputLines) {
                // Empty line in multi-line → execute compound statement
                const len = writeInputBuf(fullInput);
                const ret = exports.cp_exec(len);
                if (ret === 0) {
                    waitingForResult = true;
                    if (fullInput.trim()) {
                        inputHistory.unshift(fullInput.trimEnd());
                    }
                } else {
                    showPrompt();
                }
                inputLine = '';
                inputLines = '';
                historyIdx = -1;
                return;
            }

            // Check if we need more input (compound statement)
            const len = writeInputBuf(fullInput);
            if (exports.cp_continue(len)) {
                inputLines = fullInput + '\n';
                inputLine = '';
                showPrompt();
                return;
            }

            // Complete expression — execute
            const ret = exports.cp_exec(len);
            if (ret === 0) {
                waitingForResult = true;
                if (fullInput.trim()) {
                    inputHistory.unshift(fullInput.trimEnd());
                }
            } else {
                // Compile error — already printed, show prompt
                showPrompt();
            }
            inputLine = '';
            inputLines = '';
            historyIdx = -1;
            return;
        }

        // Backspace
        if (e.key === 'Backspace') {
            e.preventDefault();
            if (inputLine.length > 0) {
                inputLine = inputLine.slice(0, -1);
                termWrite('\b \b');
            }
            return;
        }

        // Tab — autocomplete
        if (e.key === 'Tab') {
            e.preventDefault();
            const full = (inputLines || '') + inputLine;
            const len = writeInputBuf(full);
            const complLen = exports.cp_complete(len);
            if (complLen > 0) {
                // Read completed text back from buffer
                const bytes = new Uint8Array(exports.memory.buffer, inputBufAddr, len + complLen);
                const completed = new TextDecoder().decode(bytes);
                const added = completed.slice(full.length);
                inputLine += added;
                termWrite(added);
            }
            return;
        }

        // Arrow up/down — history
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIdx < inputHistory.length - 1) {
                // Erase current line
                while (inputLine.length > 0) {
                    termWrite('\b \b');
                    inputLine = inputLine.slice(0, -1);
                }
                historyIdx++;
                inputLine = inputHistory[historyIdx];
                termWrite(inputLine);
            }
            return;
        }
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            while (inputLine.length > 0) {
                termWrite('\b \b');
                inputLine = inputLine.slice(0, -1);
            }
            if (historyIdx > 0) {
                historyIdx--;
                inputLine = inputHistory[historyIdx];
                termWrite(inputLine);
            } else {
                historyIdx = -1;
                inputLine = '';
            }
            return;
        }

        // Printable character
        if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            inputLine += e.key;
            termWrite(e.key);
        }
    });

    // Convert RGB565 framebuffer to RGBA for canvas
    function paintFramebuffer() {
        if (!fbAddr || fbWidth === 0) return;

        const fb = new Uint16Array(exports.memory.buffer, fbAddr, fbWidth * fbHeight);
        const rgba = imageData.data;
        for (let i = 0; i < fb.length; i++) {
            const pixel = fb[i];
            const r = ((pixel >> 11) & 0x1F) << 3;
            const g = ((pixel >> 5) & 0x3F) << 2;
            const b = (pixel & 0x1F) << 3;
            const j = i * 4;
            rgba[j]     = r;
            rgba[j + 1] = g;
            rgba[j + 2] = b;
            rgba[j + 3] = 255;
        }
        ctx.putImageData(imageData, 0, 0);
    }

    // Cursor — drawn by JS on the canvas, not in the framebuffer.
    // Reads cursor info struct from WASM linear memory each frame.
    // cursor_info_t layout (all uint16_t, little-endian):
    //   0: cursor_x, 2: cursor_y, 4: scroll_x, 6: scroll_y,
    //   8: top_left_y, 10: height_tiles, 12: glyph_w, 14: glyph_h,
    //   16: scale
    const CURSOR_BLINK_MS = 500;
    let cursorBlinkOn = true;
    let cursorLastToggle = performance.now();

    function drawCursor() {
        const now = performance.now();
        if (now - cursorLastToggle >= CURSOR_BLINK_MS) {
            cursorBlinkOn = !cursorBlinkOn;
            cursorLastToggle = now;
        }
        if (!cursorBlinkOn) return;

        const mem = exports.memory.buffer;
        const ci = new DataView(mem, cursorInfoAddr, 20);
        const cx = ci.getUint16(0, true);
        const cy = ci.getUint16(2, true);
        const sx = ci.getUint16(4, true);
        const sy = ci.getUint16(6, true);
        const tly = ci.getUint16(8, true);
        const htiles = ci.getUint16(10, true);
        const gw = ci.getUint16(12, true);
        const gh = ci.getUint16(14, true);
        const scale = ci.getUint16(16, true) || 1;

        if (gw === 0 || gh === 0 || htiles === 0) return;

        // Map logical cursor row through circular buffer offset
        const visualRow = ((cy - tly) % htiles + htiles) % htiles;
        const px = (sx + cx * gw) * scale;
        const py = (sy + visualRow * gh) * scale;
        const w = gw * scale;
        const h = gh * scale;

        // Draw inverted rectangle (white with "difference" blend
        // simulates XOR without touching the framebuffer)
        ctx.save();
        ctx.globalCompositeOperation = 'difference';
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px, py, w, h);
        ctx.restore();
    }

    // ── Context management ──
    const CTX_STATUSES = ['FREE', 'IDLE', 'RUNNABLE', 'RUNNING', 'YIELDED', 'SLEEPING', 'DONE'];
    const ctxMetaSize = exports.cp_context_meta_size();
    const ctxMax = exports.cp_context_max();

    function readContextMeta(id) {
        const addr = exports.cp_context_meta_addr(id);
        if (!addr) return null;
        const view = new DataView(exports.memory.buffer, addr, ctxMetaSize);
        return {
            status: view.getUint8(0),
            priority: view.getUint8(1),
            pystackCurOff: view.getUint32(4, true),
            yieldStateOff: view.getUint32(8, true),
        };
    }

    // Main loop — read VM state directly from linear memory
    let frameCount = 0;
    const SUP_REPL = 1;
    const SUP_STATES = ['INIT', 'REPL', 'EXPR', 'CODE', 'DONE'];
    const YIELD_REASONS = ['budget', 'sleep', 'show', 'io_wait', 'stdin'];

    function loop() {
        const supState = exports.cp_step(performance.now() | 0);
        paintFramebuffer();
        drawCursor();
        frameCount++;

        // When expression finishes and supervisor returns to REPL, show prompt
        if (supState === SUP_REPL && waitingForResult) {
            waitingForResult = false;
            showPrompt();
        }

        if (frameCount % 60 === 0) {
            const state = sh.readState();
            // Count active contexts
            let activeCtxs = 0;
            for (let i = 0; i < ctxMax; i++) {
                const m = readContextMeta(i);
                if (m && m.status > 0) activeCtxs++;
            }
            if (state) {
                const sup = SUP_STATES[state.supState] || '?';
                const yr = YIELD_REASONS[state.yieldReason] || '?';
                const ctx0 = readContextMeta(0);
                const ctxSt = ctx0 ? CTX_STATUSES[ctx0.status] || '?' : '?';
                status.textContent =
                    `${sup} | ctx0:${ctxSt} | ctxs:${activeCtxs} | yield:${yr} | pystack:${state.vmDepth}B`;
            } else {
                status.textContent = `Running (frame ${frameCount})`;
            }
        }
        env.requestFrame(loop);
    }

    env.requestFrame(loop);
}

main().catch(e => {
    status.textContent = 'Error: ' + e.message;
    console.error(e);
});
</script>
</body>
</html>
