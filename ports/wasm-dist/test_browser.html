<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CircuitPython WASM</title>
<style>
body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #e0e0e0; }
canvas { border: 1px solid #444; image-rendering: pixelated; }
#status { margin: 8px; font-size: 12px; color: #888; }
#serial { width: 480px; height: 120px; background: #111; color: #0f0; border: 1px solid #444; padding: 4px; font-size: 12px; font-family: monospace; overflow-y: scroll; white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>
<canvas id="display" width="480" height="360"></canvas>
<div id="status">Loading...</div>
<div id="serial"></div>

<script type="module">
import { CircuitPython } from './js/board.mjs';

const board = await CircuitPython.create({
    wasmUrl: 'build-browser/circuitpython.wasm',
    canvas: document.getElementById('display'),
    statusEl: document.getElementById('status'),
    serialEl: document.getElementById('serial'),
    codePy: 'print("Hello from CircuitPython WASM!")\n',
    persist: true,
    files: {
        '/CIRCUITPY/ticker.py': 'import time\nwhile True:\n    time.sleep(2)\n    print("tick")\n',
    },
});

window.board = board;
</script>
</body>
</html>
