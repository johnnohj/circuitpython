<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>wasm-dist demo</title>
  <style>
    body { font-family: monospace; max-width: 720px; margin: 2em auto; }
    #status { color: #666; }
    #output { background: #111; color: #eee; padding: 1em; min-height: 4em;
              white-space: pre; border-radius: 4px; }
    #error  { color: #f66; white-space: pre; }
    button  { margin-top: 0.5em; padding: 0.4em 1em; cursor: pointer; }
    textarea { width: 100%; height: 8em; font-family: monospace; font-size: 0.9em;
               box-sizing: border-box; margin-top: 0.5em; }
  </style>
</head>
<body>
  <h2>wasm-dist — CircuitPython in the browser</h2>
  <div id="status">Loading Python VM…</div>
  <textarea id="code">x = 0
for i in range(5):
    x += i
print("sum:", x)
print("hello from CircuitPython/WASM!")</textarea>
  <button id="run" disabled>Run</button>
  <pre id="output"></pre>
  <div id="error"></div>

  <script type="module">
    import { PythonHost } from './index.js';

    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const errorEl  = document.getElementById('error');
    const codeEl   = document.getElementById('code');
    const runBtn   = document.getElementById('run');

    const python = new PythonHost({ executors: 1, timeout: 5000 });

    python.on('stderr', text => { errorEl.textContent += text; });

    statusEl.textContent = 'Initializing workers…';
    await python.init();
    statusEl.textContent = 'Ready.';
    runBtn.disabled = false;

    async function runCode() {
      outputEl.textContent = '';
      errorEl.textContent  = '';
      runBtn.disabled = true;
      statusEl.textContent = 'Running…';
      try {
        const result = await python.exec(codeEl.value);
        outputEl.textContent = result.stdout || '(no output)';
        if (result.stderr) { errorEl.textContent = result.stderr; }
        if (result.aborted) { statusEl.textContent = 'Timed out.'; }
        else { statusEl.textContent = `Done in ${result.duration_ms}ms`; }
      } catch (e) {
        errorEl.textContent = String(e);
        statusEl.textContent = 'Error.';
      }
      runBtn.disabled = false;
    }

    runBtn.addEventListener('click', runCode);
    // Run once on load to show it works
    await runCode();
  </script>
</body>
</html>
