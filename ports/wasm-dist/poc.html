<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CircuitPython — Three-Piece PoC</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
h1 { font-size: 14px; color: #888; margin-bottom: 8px; }

.row { display: flex; gap: 16px; margin-bottom: 12px; }
.col { display: flex; flex-direction: column; gap: 8px; }

#serial {
    width: 500px; height: 180px;
    background: #111; border: 1px solid #333;
    padding: 8px; overflow-y: auto; white-space: pre-wrap;
    font-size: 12px; color: #0f0;
}

#editor {
    width: 500px; height: 200px;
    background: #111; border: 1px solid #333;
    padding: 8px; font-family: monospace; font-size: 12px;
    color: #fff; resize: none;
}

button {
    padding: 6px 14px; font-family: monospace; font-size: 12px;
    background: #333; color: #fff; border: 1px solid #555;
    cursor: pointer;
}
button:hover { background: #555; }

#board-frame { border: 1px solid #444; background: #000; }

#pin-tooltip {
    position: fixed;
    background: #222; border: 1px solid #666; color: #ccc;
    padding: 4px 8px; font-size: 11px;
    pointer-events: none; display: none; z-index: 100;
}

.bus-status {
    font-size: 10px; color: #555; padding: 4px 0;
}

#status { font-size: 11px; color: #666; }

/* Sensor panel */
.sensor-group { padding: 8px; background: #222; border: 1px solid #333; }
.sensor-group-title { font-size: 11px; color: #aaa; margin-bottom: 6px; font-weight: bold; }
.sensor-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.sensor-label { font-size: 10px; color: #999; min-width: 80px; }
.sensor-slider { flex: 1; height: 4px; accent-color: #4a9; }
.sensor-readout { font-size: 10px; color: #4a9; min-width: 70px; text-align: right; }
.sensor-wave { font-size: 10px; background: #333; color: #ccc; border: 1px solid #555; padding: 1px 4px; }
.sensor-period { width: 40px; font-size: 10px; background: #333; color: #ccc; border: 1px solid #555; padding: 1px 4px; text-align: center; }
</style>
</head>
<body>
<h1>CircuitPython — Three-Piece Architecture PoC</h1>
<div id="status">Loading...</div>
<div class="bus-status" id="bus-status"></div>

<div class="row" style="margin-top: 8px;">
  <!-- Left: Display + Board + Serial -->
  <div class="col">
    <canvas id="display" width="320" height="240"
            style="border: 1px solid #444; background: #000; image-rendering: pixelated;"></canvas>
    <iframe id="board-frame"
            src="hardware/board.html?def=../boards/wasm_browser/definition.json"
            width="420" height="240"
            sandbox="allow-scripts allow-same-origin"
            style="border: none;"></iframe>
    <div id="serial"></div>
    <details>
      <summary>Protocol Log</summary>
      <div id="protocol-log" style="height:120px; overflow:auto; background:#1a1a2e; color:#7fdbca; font-family:monospace; font-size:11px; padding:4px; white-space:pre;"></div>
    </details>
  </div>

  <!-- Right: Code editor + Controls -->
  <div class="col">
    <div class="row">
      <button id="btn-run">Run</button>
      <button id="btn-repl">REPL</button>
      <button id="btn-stop">Stop</button>
    </div>

    <div id="sensors"></div>

    <div class="sensor-group" id="add-component" style="display:none;">
      <div class="sensor-group-title">Add Component</div>
      <div class="sensor-row">
        <input type="text" id="component-search" placeholder="Search (bme280, lis3dh, sht40...)"
               style="flex:1; font-size:11px; background:#333; color:#ccc; border:1px solid #555; padding:3px 6px;">
      </div>
      <div id="component-results" style="max-height:120px; overflow-y:auto;"></div>
    </div>

    <div id="sample-tabs" style="display:flex; gap:2px; margin-bottom:4px;"></div>
    <textarea id="editor"></textarea>
  </div>
</div>

<div id="pin-tooltip"></div>

<script type="module">
import { CircuitPython } from './js/circuitpython.mjs';
import { SensorPanel } from './js/sensor-panel.mjs';
import { loadCatalog, searchComponents, getI2CSensors } from './js/ws-components.mjs';

const $status    = document.getElementById('status');
const $busStatus = document.getElementById('bus-status');
const $serial    = document.getElementById('serial');
const $editor    = document.getElementById('editor');
const $frame     = document.getElementById('board-frame');
const $tooltip   = document.getElementById('pin-tooltip');

const GPIO_SLOTS = 32;
const GPIO_SLOT_SIZE = 12;
const GPIO_SIZE = GPIO_SLOTS * GPIO_SLOT_SIZE;
const NEOPIXEL_REGION_SIZE = 4 + 64 * 4;

let cp = null;
let boardFrameReady = false;
let replActive = false;
let sensorPanel = null;
let wsCatalog = null;
let currentTab = null;

// ── Code samples ──

const SAMPLES = [
    {
        id: 'my-code',
        label: 'My Code',
        code: `\
# Write your code here!
import board, time

print("Hello from CircuitPython!")
`,
    },
    {
        id: 'blink',
        label: 'Blink',
        code: `\
# Blink a NeoPixel!
#   BUTTON_A → cycle color
#   BUTTON_B → move to next pixel
import board, digitalio, neopixel, time

pixels = neopixel.NeoPixel(board.NEOPIXEL, 10, auto_write=True)

btn_a = digitalio.DigitalInOut(board.BUTTON_A)
btn_a.direction = digitalio.Direction.INPUT
btn_a.pull = digitalio.Pull.UP

btn_b = digitalio.DigitalInOut(board.BUTTON_B)
btn_b.direction = digitalio.Direction.INPUT
btn_b.pull = digitalio.Pull.UP

COLORS = [
    ("Red",    (255, 0,   0)),
    ("Orange", (255, 127, 0)),
    ("Yellow", (255, 255, 0)),
    ("Green",  (0,   255, 0)),
    ("Blue",   (0,   0,   255)),
    ("Indigo", (75,  0,   130)),
    ("Violet", (148, 0,   211)),
]

pos = 0
color_idx = 0
prev_a = True
prev_b = True

while True:
    a_pressed = not btn_a.value
    if a_pressed and prev_a:
        color_idx = (color_idx + 1) % len(COLORS)
        print("Color:", COLORS[color_idx][0])
    prev_a = not a_pressed

    b_pressed = not btn_b.value
    if b_pressed and prev_b:
        pos = (pos + 1) % len(pixels)
        print("Pixel:", pos)
    prev_b = not b_pressed

    pixels.fill((0, 0, 0))
    pixels[pos] = COLORS[color_idx][1]
    time.sleep(0.3)
    pixels[pos] = (0, 0, 0)
    time.sleep(0.3)
`,
    },
    {
        id: 'sensors',
        label: 'Sensors',
        code: `\
# Sensor Demo — use the A0 slider or waveform!
import time, board, analogio, neopixel
from rainbowio import colorwheel

sensor = analogio.AnalogIn(board.A0)
pixels = neopixel.NeoPixel(board.NEOPIXEL, 10, auto_write=True)

hue = 0

while True:
    brightness = sensor.value / 65535
    for i in range(len(pixels)):
        c = colorwheel((hue + i * 25) & 255)
        r = int(((c >> 16) & 0xFF) * brightness)
        g = int(((c >> 8) & 0xFF) * brightness)
        b = int((c & 0xFF) * brightness)
        pixels[i] = (r, g, b)
    hue = (hue + 1) & 255
    time.sleep(0.02)
`,
    },
    {
        id: 'display',
        label: 'Display',
        code: `\
# Display Demo — text + shapes on the framebuffer
import board, displayio, time

display = board.DISPLAY
group = displayio.Group()

pal = displayio.Palette(4)
pal[0] = 0x000000
pal[1] = 0x89b4fa  # blue
pal[2] = 0xa6e3a1  # green
pal[3] = 0xf38ba8  # pink

for i, color_idx in enumerate([1, 2, 3]):
    bmp = displayio.Bitmap(60, 40, 4)
    for x in range(60):
        for y in range(40):
            bmp[x, y] = color_idx
    sprite = displayio.TileGrid(bmp, pixel_shader=pal, x=30 + i*70, y=20 + i*50)
    group.append(sprite)

display.root_group = group

dx = [2, -1, 1]
while True:
    for i, sprite in enumerate(group):
        sprite.x += dx[i]
        if sprite.x <= 0 or sprite.x >= display.width - 60:
            dx[i] = -dx[i]
    time.sleep(0.03)
`,
    },
    {
        id: 'io',
        label: 'Digital I/O',
        code: `\
# Digital I/O — read buttons, print state
import board, digitalio, time

btn_a = digitalio.DigitalInOut(board.BUTTON_A)
btn_a.direction = digitalio.Direction.INPUT
btn_a.pull = digitalio.Pull.UP

btn_b = digitalio.DigitalInOut(board.BUTTON_B)
btn_b.direction = digitalio.Direction.INPUT
btn_b.pull = digitalio.Pull.UP

while True:
    if not btn_a.value:
        print("Button A pressed!")
    if not btn_b.value:
        print("Button B pressed!")
    time.sleep(0.1)
`,
    },
];

// ── Sample tab UI ──

function initSampleTabs() {
    const $tabs = document.getElementById('sample-tabs');
    for (const sample of SAMPLES) {
        const btn = document.createElement('button');
        btn.textContent = sample.label;
        btn.style.cssText = 'padding:3px 8px; font-size:11px; cursor:pointer; border:1px solid #555; background:#333; color:#ccc; border-radius:3px 3px 0 0;';
        btn.onclick = () => switchTab(sample.id);
        btn.dataset.id = sample.id;
        $tabs.appendChild(btn);
    }
    switchTab('my-code');
}

function switchTab(id) {
    currentTab = id;
    const sample = SAMPLES.find(s => s.id === id);
    if (sample) $editor.value = sample.code;
    for (const btn of document.querySelectorAll('#sample-tabs button')) {
        btn.style.background = btn.dataset.id === id ? '#555' : '#333';
        btn.style.color = btn.dataset.id === id ? '#fff' : '#ccc';
    }
}

// ── Display canvas (RGB565 → RGBA) ──
const $display = document.getElementById('display');
const ctx2d = $display.getContext('2d');
let imageData = null;

// ── Forward bus state to iframe ──

function sendToBoard(type, data, width, height) {
    if (!boardFrameReady) return;
    $frame.contentWindow.postMessage({ type, data, width, height }, '*');
}

function onFrame() {
    if (!cp) return;
    const port = cp.port;

    // GPIO — only send when changed
    if (port.changed('gpio')) {
        const gpio = port.read('gpio');
        sendToBoard('gpio', Array.from(gpio));
        port.acknowledge('gpio');
    }

    // NeoPixel — only send when changed
    if (port.changed('neopixel')) {
        const neo = port.read('neopixel');
        sendToBoard('neopixel', Array.from(neo));
        port.acknowledge('neopixel');
    }

    // Framebuffer — direct path to canvas (not on sync bus)
    const rawFb = cp.consumeFramebuffer();
    if (rawFb && cp.fbWidth > 0) {
        const w = cp.fbWidth, h = cp.fbHeight;
        if (!imageData || imageData.width !== w) {
            $display.width = w;
            $display.height = h;
            imageData = ctx2d.createImageData(w, h);
        }
        const fb = new Uint16Array(rawFb.buffer, rawFb.byteOffset, w * h);
        const rgba = imageData.data;
        for (let i = 0; i < fb.length; i++) {
            const px = fb[i];
            const j = i * 4;
            rgba[j]     = ((px >> 11) & 0x1F) << 3;
            rgba[j + 1] = ((px >> 5) & 0x3F) << 2;
            rgba[j + 2] = (px & 0x1F) << 3;
            rgba[j + 3] = 255;
        }
        ctx2d.putImageData(imageData, 0, 0);
    }

    // Cursor — solid white rectangle, REPL only
    const cur = cp.cursor;
    if (replActive && cur && cur.gw > 0 && cur.gh > 0 && cur.htiles > 0) {
        const row = ((cur.y - cur.tly) % cur.htiles + cur.htiles) % cur.htiles;
        const px = (cur.sx + cur.x * cur.gw) * cur.scale;
        const py = (cur.sy + row * cur.gh) * cur.scale;
        const cw = cur.gw * cur.scale;
        const ch = cur.gh * cur.scale;
        ctx2d.save();
        ctx2d.globalCompositeOperation = 'difference';
        ctx2d.fillStyle = '#ffffff';
        ctx2d.fillRect(px, py, cw, ch);
        ctx2d.restore();
    }

    // Tick sensor waveforms
    if (sensorPanel) sensorPanel.tick();

    // Bus status display
    $busStatus.textContent =
        `bus: gpio seq=${port._readSeq(cp.bus._regionInfo('gpio'))} ` +
        `neo seq=${port._readSeq(cp.bus._regionInfo('neopixel'))}`;
}

// ── Receive messages from iframe ──

window.addEventListener('message', (e) => {
    const msg = e.data;
    if (!msg || msg.source !== 'hardware') return;

    // Handle both WS-aligned signals and legacy types
    const key = msg.signal || msg.type;
    switch (key) {
        case 'ready':
            boardFrameReady = true;
            break;

        case 'hover':
            if (msg.pin !== null && (msg.name || msg.pin_name)) {
                $tooltip.textContent = msg.pin_name || msg.name;
                $tooltip.style.display = 'block';
                const rect = $frame.getBoundingClientRect();
                $tooltip.style.left = (rect.left + msg.x + 15) + 'px';
                $tooltip.style.top = (rect.top + msg.y - 5) + 'px';
            } else {
                $tooltip.style.display = 'none';
            }
            break;

        // WS-aligned: pin_event carries both press and release
        case 'pin_event':
            if (cp && msg.pin_id !== undefined) {
                cp.setInput(msg.pin_id, msg.pin_value);
            }
            break;

        // Legacy compat
        case 'press':
            if (cp && msg.pin !== undefined) cp.setInput(msg.pin, 0);
            break;
        case 'release':
            if (cp && msg.pin !== undefined) cp.setInput(msg.pin, 1);
            break;
    }
});

// ── Init ──

async function init() {
    try {
        const base = new URL('.', location.href).href;
        cp = await CircuitPython.create({
            wasmUrl: base + 'build-ws-worker/circuitpython.wasm',
            syncUrl: base + 'sync/sync.wasm',
            onStdout: (text) => {
                // Strip ANSI escapes (colors, cursor, status bar title)
                const clean = text.replace(/\x1b\[[0-9;]*[A-Za-z]/g, '')
                                  .replace(/\x1b\][^\x07\x1b]*(\x07|\x1b\\)/g, '')
                                  .replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g, '');
                if (clean) {
                    $serial.textContent += clean;
                    $serial.scrollTop = $serial.scrollHeight;
                }
            },
            onStderr: (text) => {
                const clean = text.replace(/\x1b\[[0-9;]*[A-Za-z]/g, '')
                                  .replace(/\x1b\][^\x07\x1b]*(\x07|\x1b\\)/g, '')
                                  .replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g, '');
                if (clean) {
                    $serial.textContent += clean;
                    $serial.scrollTop = $serial.scrollHeight;
                }
            },
            onProtocol: (msg) => {
                const $proto = document.getElementById('protocol-log');
                if ($proto) {
                    const line = `${msg.type}: ${JSON.stringify(msg, null, 0)}\n`;
                    $proto.textContent += line;
                    $proto.scrollTop = $proto.scrollHeight;
                    // Keep last 200 lines
                    const lines = $proto.textContent.split('\n');
                    if (lines.length > 200) {
                        $proto.textContent = lines.slice(-200).join('\n');
                    }
                }
            },
            onFrame,
        });

        // ── Set up sensor panels ──
        sensorPanel = new SensorPanel(document.getElementById('sensors'), {
            onUpdate: (index, value, u16) => {
                // Write to sync bus analog slot
                const port = cp.port;
                const slot = new Uint8Array(4);
                slot[0] = (u16 >> 8) & 0xFF;  // value high
                slot[1] = u16 & 0xFF;          // value low
                slot[2] = 1;                    // enabled
                port.writeSlot('analog', index, slot);
                // Send to VM Worker
                cp._worker.postMessage({ type: 'analog_input', index, value: u16 });
            },
        });

        // Load component definitions and add to panel
        const components = ['bme280', 'lis3dh'];
        for (const name of components) {
            try {
                const resp = await fetch(base + `boards/components/${name}/definition.json`);
                const def = await resp.json();
                sensorPanel.addComponent(def);
            } catch (e) { /* component not found, skip */ }
        }

        // Add analog pins from board definition
        const boardDef = await fetch(base + 'boards/wasm_browser/definition.json').then(r => r.json());
        for (const pin of boardDef.pins) {
            if (pin.capabilities?.analog_in) {
                sensorPanel.addAnalogPin(pin.name, {
                    min: 0, max: 3.3, unit: 'V', defaultValue: 0,
                    pinId: pin.id,  // use pin number as analog slot index
                });
            }
        }

        // Load Wippersnapper component catalog for "Add Component"
        try {
            wsCatalog = await loadCatalog();
            const $addComp = document.getElementById('add-component');
            $addComp.style.display = 'block';
            const $search = document.getElementById('component-search');
            const $results = document.getElementById('component-results');

            $search.addEventListener('input', () => {
                const q = $search.value.trim();
                $results.innerHTML = '';
                if (q.length < 2) return;
                const matches = searchComponents(wsCatalog, q).slice(0, 8);
                for (const def of matches) {
                    const btn = document.createElement('button');
                    btn.style.cssText = 'display:block; width:100%; text-align:left; margin:2px 0; font-size:10px;';
                    btn.textContent = `${def.displayName} (${def.sensors.length} sensors)`;
                    btn.addEventListener('click', () => {
                        sensorPanel.addComponent(def);
                        $search.value = '';
                        $results.innerHTML = '';
                    });
                    $results.appendChild(btn);
                }
            });
        } catch (e) {
            console.log('WS catalog not available:', e.message);
        }

        initSampleTabs();
        $status.textContent = 'Ready — VM in Worker | sync bus broker | board in iframe';
    } catch (err) {
        $status.textContent = 'Error: ' + err.message;
        console.error(err);
    }
}

// ── Controls ──

document.getElementById('btn-run').addEventListener('click', () => {
    if (!cp) return;
    replActive = false;
    $serial.textContent = '';
    cp.writeFile('/CIRCUITPY/code.py', $editor.value);
    cp.execFile('/CIRCUITPY/code.py');
});

document.getElementById('btn-repl').addEventListener('click', () => {
    if (!cp) return;
    cp.stop();
    $serial.textContent = '';
    cp.startRepl();
    replActive = true;
});

document.getElementById('btn-stop').addEventListener('click', () => {
    if (!cp) return;
    cp.stop();
    replActive = false;
    // Clear hardware state on the bus
    const port = cp.port;
    port.writeSlab('neopixel', new Uint8Array(NEOPIXEL_REGION_SIZE));
    for (let i = 0; i < GPIO_SLOTS; i++) {
        port.writeSlot('gpio', i, new Uint8Array(GPIO_SLOT_SIZE));
    }
    // Forward cleared state to iframe
    sendToBoard('gpio', new Array(GPIO_SIZE).fill(0));
    sendToBoard('neopixel', new Array(NEOPIXEL_REGION_SIZE).fill(0));
});

// ── Keyboard → serial ──

document.addEventListener('keydown', (e) => {
    if (!cp || e.target.tagName === 'TEXTAREA') return;
    if (e.ctrlKey && e.key === 'c') { cp.ctrlC(); e.preventDefault(); return; }
    if (e.ctrlKey && e.key === 'd') { cp.ctrlD(); e.preventDefault(); return; }
    if (e.key === 'Enter') { cp.pushSerial(13); e.preventDefault(); return; }
    if (e.key === 'Backspace') { cp.pushSerial(127); e.preventDefault(); return; }
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        cp.pushSerial(e.key.charCodeAt(0));
        e.preventDefault();
    }
});

init();
</script>
</body>
</html>
