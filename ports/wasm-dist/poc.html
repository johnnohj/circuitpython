<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CircuitPython — Three-Piece PoC</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
h1 { font-size: 14px; color: #888; margin-bottom: 8px; }

.row { display: flex; gap: 16px; margin-bottom: 12px; }
.col { display: flex; flex-direction: column; gap: 8px; }

canvas { border: 1px solid #444; background: #000; image-rendering: pixelated; }

#serial {
    width: 500px; height: 200px;
    background: #111; border: 1px solid #333;
    padding: 8px; overflow-y: auto; white-space: pre-wrap;
    font-size: 12px; color: #0f0;
}

#editor {
    width: 500px; height: 180px;
    background: #111; border: 1px solid #333;
    padding: 8px; font-family: monospace; font-size: 12px;
    color: #fff; resize: none;
}

button {
    padding: 6px 14px; font-family: monospace; font-size: 12px;
    background: #333; color: #fff; border: 1px solid #555;
    cursor: pointer;
}
button:hover { background: #555; }
button.active { background: #2a6; }

.hw-panel {
    display: flex; gap: 8px; align-items: center;
    padding: 8px; background: #222; border: 1px solid #333;
}
.hw-panel label { font-size: 11px; color: #999; }

.gpio-grid {
    display: grid; grid-template-columns: repeat(8, 28px); gap: 2px;
}
.gpio-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid #444; background: #222;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; color: #666; cursor: pointer;
}
.gpio-dot.claimed { border-color: #48f; }
.gpio-dot.high { background: #4a4; }
.gpio-dot.low { background: #633; }
.gpio-dot.input { border-color: #f84; }

.neopixel-strip { display: flex; gap: 3px; }
.neopixel-led {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1px solid #333; background: #111;
}

#status { font-size: 11px; color: #666; }
</style>
</head>
<body>
<h1>CircuitPython — Three-Piece Architecture PoC</h1>
<div id="status">Loading...</div>

<div class="row" style="margin-top: 12px;">
  <!-- Left: Display + Serial -->
  <div class="col">
    <canvas id="display" width="240" height="180"></canvas>
    <div id="serial"></div>
  </div>

  <!-- Right: Code + Controls + Hardware -->
  <div class="col">
    <div class="row">
      <button id="btn-run">Run</button>
      <button id="btn-repl">REPL</button>
      <button id="btn-stop">Stop</button>
    </div>

    <textarea id="editor"># Button + NeoPixel demo
import board, digitalio, neopixel, time

pixels = neopixel.NeoPixel(board.NEOPIXEL, 10, auto_write=True)
btn = digitalio.DigitalInOut(board.BUTTON_A)
btn.direction = digitalio.Direction.INPUT
btn.pull = digitalio.Pull.UP

color_idx = 0
COLORS = [(255,0,0),(255,127,0),(255,255,0),
           (0,255,0),(0,0,255),(75,0,130),(148,0,211)]

while True:
    if not btn.value:
        pixels[0] = COLORS[color_idx]
        color_idx = (color_idx + 1) % len(COLORS)
        while not btn.value:
            time.sleep(0.05)
    time.sleep(0.1)
</textarea>

    <!-- Hardware state (read from hardware.wasm) -->
    <div class="hw-panel">
      <label>GPIO:</label>
      <div class="gpio-grid" id="gpio-grid"></div>
    </div>

    <div class="hw-panel">
      <label>NeoPixels:</label>
      <div class="neopixel-strip" id="neopixel-strip"></div>
    </div>

    <div class="hw-panel">
      <button id="btn-a">BTN A</button>
      <button id="btn-b">BTN B</button>
    </div>
  </div>
</div>

<script type="module">
import { CircuitPython } from './js/circuitpython.mjs';

const $status   = document.getElementById('status');
const $serial   = document.getElementById('serial');
const $editor   = document.getElementById('editor');
const $canvas   = document.getElementById('display');
const $gpioGrid = document.getElementById('gpio-grid');
const $neoStrip = document.getElementById('neopixel-strip');

let cp = null;

// ── Build GPIO visualization ──
const gpioDots = [];
for (let i = 0; i < 32; i++) {
    const dot = document.createElement('div');
    dot.className = 'gpio-dot';
    dot.textContent = i;
    $gpioGrid.appendChild(dot);
    gpioDots.push(dot);
}

// ── Build NeoPixel visualization ──
const neoLeds = [];
for (let i = 0; i < 10; i++) {
    const led = document.createElement('div');
    led.className = 'neopixel-led';
    $neoStrip.appendChild(led);
    neoLeds.push(led);
}

// ── Render hardware state from hardware.wasm ──
let lastGpioChanges = 0;
let lastNeoChanges = 0;

function renderHardware() {
    if (!cp) return;

    // GPIO — read from hardware.wasm every frame
    const gpio = new Uint8Array(cp.hwMemory.buffer, cp.hwGpioAddr, 32 * 12);
    for (let i = 0; i < 32; i++) {
        const off = i * 12;
        const enabled = gpio[off];
        const direction = gpio[off + 1];
        const value = gpio[off + 2];
        const dot = gpioDots[i];
        dot.className = 'gpio-dot'
            + (enabled ? ' claimed' : '')
            + (enabled && direction === 0 ? ' input' : '')
            + (enabled && value ? ' high' : '')
            + (enabled && !value && direction === 1 ? ' low' : '');
    }

    // NeoPixels — read from hardware.wasm every frame
    // Header: [pin:u8][enabled:u8][num_bytes:u16le]
    // Data: GRB bytes (NeoPixel wire format)
    const neo = new Uint8Array(cp.hwMemory.buffer, cp.hwNeopixelAddr, 4 + 64 * 4);
    const enabled = neo[1];
    const numBytes = neo[2] | (neo[3] << 8);
    const bpp = 3;  // GRB
    const count = enabled ? Math.min(Math.floor(numBytes / bpp), 10) : 0;
    for (let i = 0; i < 10; i++) {
        if (i < count) {
            const base = 4 + i * bpp;
            const g = neo[base], r = neo[base + 1], b = neo[base + 2];
            neoLeds[i].style.background = `rgb(${r},${g},${b})`;
            neoLeds[i].style.borderColor = (r + g + b > 0) ? '#fff' : '#333';
        } else {
            neoLeds[i].style.background = '#111';
            neoLeds[i].style.borderColor = '#333';
        }
    }
}

// ── Init ──
async function init() {
    try {
        const base = new URL('.', location.href).href;
        cp = await CircuitPython.create({
            wasmUrl: base + 'build-browser/circuitpython.wasm',
            hardwareUrl: base + 'hardware/hardware.wasm',
            canvas: $canvas,
            onStdout: (text) => {
                $serial.textContent += text;
                $serial.scrollTop = $serial.scrollHeight;
            },
            onStderr: (text) => {
                $serial.textContent += text;
                $serial.scrollTop = $serial.scrollHeight;
            },
            onFrame: renderHardware,
        });

        $status.textContent = 'Ready — VM in Worker, hardware on main thread';
    } catch (err) {
        $status.textContent = 'Error: ' + err.message;
        console.error(err);
    }
}

// ── Controls ──
document.getElementById('btn-run').addEventListener('click', () => {
    if (!cp) return;
    $serial.textContent = '';
    cp.writeFile('/CIRCUITPY/code.py', $editor.value);
    cp.execFile('/CIRCUITPY/code.py');
});

document.getElementById('btn-repl').addEventListener('click', () => {
    if (!cp) return;
    cp.stop();
    $serial.textContent = '';
    cp.startRepl();
});

document.getElementById('btn-stop').addEventListener('click', () => {
    if (!cp) return;
    cp.stop();
});

// ── Keyboard → serial ──
document.addEventListener('keydown', (e) => {
    if (!cp || e.target.tagName === 'TEXTAREA') return;
    if (e.ctrlKey && e.key === 'c') { cp.ctrlC(); e.preventDefault(); return; }
    if (e.ctrlKey && e.key === 'd') { cp.ctrlD(); e.preventDefault(); return; }
    if (e.key === 'Enter') { cp.pushSerial(13); e.preventDefault(); return; }
    if (e.key === 'Backspace') { cp.pushSerial(127); e.preventDefault(); return; }
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        cp.pushSerial(e.key.charCodeAt(0));
        e.preventDefault();
    }
});

// ── Button hardware inputs ──
// BUTTON_A = pin 21, BUTTON_B = pin 22 (from board_pins.c)
function setupHwButton(elId, pin) {
    const el = document.getElementById(elId);
    el.addEventListener('mousedown', () => { if (cp) cp.setInput(pin, 0); });
    el.addEventListener('mouseup',   () => { if (cp) cp.setInput(pin, 1); });
    el.addEventListener('mouseleave',() => { if (cp) cp.setInput(pin, 1); });
}
setupHwButton('btn-a', 21);
setupHwButton('btn-b', 22);

init();
</script>
</body>
</html>
