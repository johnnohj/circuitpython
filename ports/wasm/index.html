<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CircuitPython — Browser Board</title>
<style>
:root {
    --bg: #1e1e2e;
    --surface: #282838;
    --border: #3e3e5e;
    --text: #cdd6f4;
    --dim: #6c7086;
    --accent: #89b4fa;
    --green: #a6e3a1;
    --red: #f38ba8;
    --yellow: #f9e2af;
    --font: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr 1fr;
    gap: 1px;
}

/* ── Header ── */
header {
    grid-column: 1 / -1;
    background: var(--surface);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
}
header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
}
header .status {
    color: var(--dim);
    font-size: 12px;
    margin-left: auto;
}

/* ── Panels ── */
.panel {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.panel-title {
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
}
.panel-title .actions {
    margin-left: auto;
    display: flex;
    gap: 4px;
}

/* ── Board panel (top-left) ── */
#board-panel {
    grid-column: 1;
    grid-row: 2;
}
#board-canvas {
    flex: 1;
    min-height: 0;
}
#board-svg {
    width: 100%;
    height: 100%;
}

/* ── Editor panel (top-right) ── */
#editor-panel {
    grid-column: 2;
    grid-row: 2;
}
#editor {
    flex: 1;
    resize: none;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    padding: 8px 12px;
    border: none;
    outline: none;
    tab-size: 4;
    min-height: 0;
}

/* ── Console panel (bottom, full width) ── */
#console-panel {
    grid-column: 1 / -1;
    grid-row: 3;
}
#console-body {
    flex: 1;
    min-height: 0;
    position: relative;
}
#display-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
}
#display-canvas {
    image-rendering: pixelated;
    max-width: 100%;
    max-height: 100%;
}
#text-output {
    position: absolute;
    inset: 0;
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 12px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
    background: var(--surface);
}
/* Display area accepts focus for keyboard REPL input */
#display-wrap:focus {
    outline: 1px solid var(--accent);
    outline-offset: -1px;
}
/* Show/hide layers */
#console-body[data-view="display"] #display-wrap { display: flex; }
#console-body[data-view="display"] #text-output { display: none; }
#console-body[data-view="text"] #display-wrap { display: none; }
#console-body[data-view="text"] #text-output { display: block; }

/* ── Loading overlay ── */
#loading-overlay {
    grid-column: 1 / -1;
    grid-row: 2 / -1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg);
    color: var(--dim);
    font-size: 14px;
    z-index: 10;
}
#loading-overlay.hidden { display: none; }

/* ── Settings ── */
.setting {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--dim);
    cursor: pointer;
    user-select: none;
}
.setting input[type="checkbox"] {
    accent-color: var(--accent);
}

/* ── Buttons ── */
button {
    background: var(--border);
    color: var(--text);
    border: none;
    padding: 3px 10px;
    border-radius: 3px;
    font-family: var(--font);
    font-size: 11px;
    cursor: pointer;
}
button:hover { background: var(--accent); color: var(--bg); }
button.danger:hover { background: var(--red); }
button.primary { background: var(--accent); color: var(--bg); }

/* ── Board visualization ── */
.pin-circle {
    transition: fill 0.1s;
}
.pin-label {
    font-size: 9px;
    fill: var(--dim);
    text-anchor: middle;
    pointer-events: none;
    font-family: var(--font);
}
.neopixel-led {
    transition: fill 0.05s;
    filter: url(#neopixel-glow);
}
.component-label {
    font-size: 8px;
    fill: var(--dim);
    text-anchor: middle;
    font-family: var(--font);
}
</style>
</head>
<body>

<header>
    <h1>CircuitPython</h1>
    <span id="board-name"></span>
    <label class="setting">
        <input type="checkbox" id="opt-verbose"> Verbose
    </label>
    <span class="status" id="status">Loading</span>
</header>

<!-- Loading overlay — covers board+editor+console until cp_init returns -->
<div id="loading-overlay">Loading CircuitPython WASM, please wait...</div>

<!-- Board (top-left) -->
<div class="panel" id="board-panel">
    <div class="panel-title">
        Board
        <div class="actions">
            <button id="btn-a" title="Press Button A">BTN A</button>
            <button id="btn-b" title="Press Button B">BTN B</button>
        </div>
    </div>
    <div id="board-canvas">
        <svg id="board-svg" viewBox="0 0 400 220" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
</div>

<!-- Editor (top-right) -->
<div class="panel" id="editor-panel">
    <div class="panel-title">
        code.py
        <div class="actions">
            <button id="btn-run" class="primary" title="Save & Run (Ctrl+S)">Run</button>
            <button id="btn-repl" title="Enter REPL">REPL</button>
            <button id="btn-stop" class="danger" title="Stop & Reset">Stop</button>
        </div>
    </div>
    <textarea id="editor" spellcheck="false"></textarea>
</div>

<!-- Console (bottom) -->
<div class="panel" id="console-panel">
    <div class="panel-title">
        <button id="btn-view-display" class="primary" title="Show display">Display</button>
        <button id="btn-view-text" title="Show serial output">Serial</button>
        <div class="actions">
            <button id="btn-clear">Clear</button>
        </div>
    </div>
    <div id="console-body" data-view="display">
        <div id="display-wrap" tabindex="0">
            <canvas id="display-canvas" width="480" height="360"></canvas>
        </div>
        <div id="text-output"></div>
    </div>
</div>

<script type="module">
import { CircuitPython } from './js/circuitpython.mjs';
import { BoardAdapter, loadBoardAdapter } from './js/board-adapter.mjs';

// ── DOM elements ──
const $status = document.getElementById('status');
const $boardName = document.getElementById('board-name');
const $textOutput = document.getElementById('text-output');
const $editor = document.getElementById('editor');
const $svg = document.getElementById('board-svg');
const $consoleBody = document.getElementById('console-body');
const $canvas = document.getElementById('display-canvas');
const $loading = document.getElementById('loading-overlay');
const $displayWrap = document.getElementById('display-wrap');

// ── State ──
let board = null;
let adapter = null;
let mode = 'loading'; // loading | ready | editor | repl

function setMode(m) {
    mode = m;
    $status.textContent = {
        loading: 'Loading',
        ready: 'Ready',
        editor: 'Running',
        repl: 'REPL',
    }[m] || m;
}

// ── Initialize ──
// Layer 1: instantiate WASM, create MEMFS, restore IDB, seed defaults.
// Layer 2: cp_init (mp_init, GC, pystack, HAL, display).
// Does NOT auto-run code — user picks Run or REPL.
async function init() {
    $status.textContent = 'Loading...';

    adapter = await loadBoardAdapter(
        'boards/wasm_browser/definition.json',
        'boards/wasm_browser/magic.json',
    );
    $boardName.textContent = adapter.displayName;

    board = await CircuitPython.create({
        wasmUrl: 'build-browser/circuitpython.wasm',
        canvas: $canvas,
        persist: true,   // IDB persistence for /CIRCUITPY/
        onStdout: handleStdout,
        onStderr: (text) => {
            if (text.startsWith('[sup]') && !$verbose.checked) return;
            appendText(text);
        },
        onCodeDone: () => {
            // code.py finished — cleanup Layer 3, return to ready
            board._exports.cp_cleanup();
            setMode('ready');
        },
    });

    // Disable supervisor debug output by default
    board._exports.cp_set_debug(0);

    // Populate editor from MEMFS (may have come from IDB or seedDrive default)
    const codePy = board._wasi.readFile('/CIRCUITPY/code.py');
    if (codePy) {
        $editor.value = new TextDecoder().decode(codePy);
    }

    // Build board SVG
    renderBoardSvg();

    // Hide loading overlay, show panels
    $loading.classList.add('hidden');
    setMode('ready');

    // Start render loop for board visualization
    requestAnimationFrame(renderLoop);
}

// ── Verbose toggle ──
const $verbose = document.getElementById('opt-verbose');
$verbose.addEventListener('change', () => {
    if (board) board._exports.cp_set_debug($verbose.checked ? 1 : 0);
});

// ── Stdout handling ──
function handleStdout(text) {
    appendText(text);
}

function appendText(text) {
    $textOutput.textContent += text;
    $textOutput.scrollTop = $textOutput.scrollHeight;
}

// ── Actions ──

// Layer 3 cleanup: tear down user session (pins, buses, display, GC),
// clear serial output. Layer 2 (VM, pystack, HAL) stays intact.
function cleanup() {
    board._exports.cp_cleanup();
    $textOutput.textContent = '';
}

// Run: cleanup → write editor to code.py → start execution
document.getElementById('btn-run').addEventListener('click', startEditor);

function startEditor() {
    if (!board) return;
    cleanup();
    const code = $editor.value;
    const enc = new TextEncoder();
    board._wasi.writeFile('/CIRCUITPY/code.py', enc.encode(code));
    setMode('editor');
    setView('display');
}

// REPL: cleanup → enter REPL (display shows terminal)
document.getElementById('btn-repl').addEventListener('click', startRepl);

function startRepl() {
    if (!board) return;
    cleanup();
    board._enterRepl();
    setMode('repl');
    setView('display');
    $displayWrap.focus();
}

// Stop: cleanup → idle (user picks next action)
document.getElementById('btn-stop').addEventListener('click', stopAndReset);

function stopAndReset() {
    if (!board) return;
    cleanup();
    setMode('ready');
    setView('display');
}

// Ctrl+S to run from editor
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        startEditor();
    }
});

// ── View toggle ──
const $btnDisplay = document.getElementById('btn-view-display');
const $btnSerial = document.getElementById('btn-view-text');

function setView(view) {
    $consoleBody.dataset.view = view;
    $btnDisplay.classList.toggle('primary', view === 'display');
    $btnSerial.classList.toggle('primary', view === 'text');
}
$btnDisplay.addEventListener('click', () => setView('display'));
$btnSerial.addEventListener('click', () => setView('text'));
document.getElementById('btn-clear').addEventListener('click', () => {
    $textOutput.textContent = '';
});

// ── Button controls ──
function setupButton(btnId, pinName) {
    const el = document.getElementById(btnId);
    el.addEventListener('mousedown', () => adapter?.setInput(board, pinName, false));
    el.addEventListener('mouseup', () => adapter?.setInput(board, pinName, true));
    el.addEventListener('mouseleave', () => adapter?.setInput(board, pinName, true));
}
setupButton('btn-a', 'BUTTON_A');
setupButton('btn-b', 'BUTTON_B');

// ── Board SVG rendering ──
function renderBoardSvg() {
    if (!adapter) return;
    const ns = 'http://www.w3.org/2000/svg';

    // Glow filter for NeoPixel LEDs — simulates light emission
    const defs = document.createElementNS(ns, 'defs');
    const filter = document.createElementNS(ns, 'filter');
    filter.setAttribute('id', 'neopixel-glow');
    filter.setAttribute('x', '-50%');
    filter.setAttribute('y', '-50%');
    filter.setAttribute('width', '200%');
    filter.setAttribute('height', '200%');
    const blur = document.createElementNS(ns, 'feGaussianBlur');
    blur.setAttribute('in', 'SourceGraphic');
    blur.setAttribute('stdDeviation', '3');
    blur.setAttribute('result', 'blur');
    filter.appendChild(blur);
    const merge = document.createElementNS(ns, 'feMerge');
    const m1 = document.createElementNS(ns, 'feMergeNode');
    m1.setAttribute('in', 'blur');
    merge.appendChild(m1);
    const m2 = document.createElementNS(ns, 'feMergeNode');
    m2.setAttribute('in', 'SourceGraphic');
    merge.appendChild(m2);
    filter.appendChild(merge);
    defs.appendChild(filter);
    $svg.appendChild(defs);

    // Board background
    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('width', '400');
    bg.setAttribute('height', '220');
    bg.setAttribute('rx', '8');
    bg.setAttribute('fill', '#1a3a2a');
    bg.setAttribute('stroke', '#2a5a3a');
    bg.setAttribute('stroke-width', '2');
    $svg.appendChild(bg);

    // Title
    const title = document.createElementNS(ns, 'text');
    title.setAttribute('x', '200');
    title.setAttribute('y', '115');
    title.setAttribute('text-anchor', 'middle');
    title.setAttribute('fill', '#3a6a4a');
    title.setAttribute('font-size', '12');
    title.setAttribute('font-family', 'var(--font)');
    title.textContent = adapter.boardName.toUpperCase();
    $svg.appendChild(title);

    // Pins
    for (const pin of adapter.pins) {
        const v = pin.visual;
        if (!v) continue;

        const g = document.createElementNS(ns, 'g');
        g.setAttribute('data-pin', pin.name);

        const circle = document.createElementNS(ns, 'circle');
        circle.setAttribute('cx', v.x);
        circle.setAttribute('cy', v.y);
        circle.setAttribute('r', v.side === 'internal' ? 8 : 6);
        circle.setAttribute('fill', '#333');
        circle.setAttribute('stroke', '#555');
        circle.setAttribute('stroke-width', '1');
        circle.classList.add('pin-circle');
        g.appendChild(circle);

        const label = document.createElementNS(ns, 'text');
        label.setAttribute('x', v.x);
        label.setAttribute('y', v.side === 'bottom' ? v.y + 16 : v.y - 10);
        label.classList.add('pin-label');
        label.textContent = pin.displayName || pin.name;
        g.appendChild(label);

        // Make input-capable pins interactive (buttons, switches)
        if (pin.capabilities.digital && v.side === 'internal') {
            g.style.cursor = 'pointer';
            g.addEventListener('mousedown', () => adapter?.setInput(board, pin.name, false));
            g.addEventListener('mouseup', () => adapter?.setInput(board, pin.name, true));
            g.addEventListener('mouseleave', () => adapter?.setInput(board, pin.name, true));
        }

        $svg.appendChild(g);
    }

    // NeoPixel strip placeholder (10 LEDs near NEOPIXEL pin)
    const npPin = adapter.resolvePin('NEOPIXEL');
    if (npPin) {
        for (let i = 0; i < 10; i++) {
            const led = document.createElementNS(ns, 'circle');
            led.setAttribute('cx', 200 + (i - 4.5) * 18);
            led.setAttribute('cy', 160);
            led.setAttribute('r', 7);
            led.setAttribute('fill', '#111');
            led.setAttribute('stroke', '#333');
            led.setAttribute('stroke-width', '1');
            led.classList.add('neopixel-led');
            led.setAttribute('data-np-index', i);
            $svg.appendChild(led);
        }
    }

    // Power pins
    if (adapter.power) {
        for (const p of [...(adapter.power.threeVolt || []), ...(adapter.power.fiveVolt || []), ...(adapter.power.ground || [])]) {
            const label = document.createElementNS(ns, 'text');
            label.setAttribute('x', p.x);
            label.setAttribute('y', p.label === 'GND' ? (p.y > 100 ? p.y + 16 : p.y - 10) : p.y - 10);
            label.classList.add('pin-label');
            label.setAttribute('fill', p.label === 'GND' ? '#666' : (p.label === '3V3' ? 'var(--yellow)' : 'var(--red)'));
            label.textContent = p.label;
            $svg.appendChild(label);
        }
    }
}

// ── Live state render loop ──
function renderLoop() {
    if (!board || !adapter) {
        requestAnimationFrame(renderLoop);
        return;
    }

    const snap = adapter.getSnapshot(board);

    // Update pin circles based on state
    for (const [name, state] of Object.entries(snap.pins)) {
        const g = $svg.querySelector(`[data-pin="${name}"]`);
        if (!g) continue;
        const circle = g.querySelector('.pin-circle');
        if (!circle) continue;

        if (!state.gpio || !state.gpio.enabled) {
            circle.setAttribute('fill', '#333');
            circle.setAttribute('stroke', '#555');
        } else if (state.gpio.direction === 1) {
            // Output pin
            circle.setAttribute('fill', state.gpio.value ? '#a6e3a1' : '#45475a');
            circle.setAttribute('stroke', state.gpio.value ? '#74c7a0' : '#555');
        } else {
            // Input pin
            circle.setAttribute('fill', state.gpio.value ? '#89b4fa' : '#313244');
            circle.setAttribute('stroke', '#555');
        }

        // Analog overlay
        if (state.analog && state.analog.enabled) {
            const pct = state.analog.value / 65535;
            circle.setAttribute('fill', `hsl(${120 * pct}, 60%, ${30 + 30 * pct}%)`);
        }

        // PWM overlay (brightness)
        if (state.pwm && state.pwm.enabled) {
            const b = state.pwm.brightness;
            circle.setAttribute('fill', `rgb(${Math.round(b * 166)}, ${Math.round(b * 227)}, ${Math.round(b * 161)})`);
        }
    }

    // Update NeoPixel LEDs
    const npStrip = snap.neopixels['NEOPIXEL'];
    if (npStrip) {
        for (let i = 0; i < npStrip.numPixels && i < 10; i++) {
            const el = $svg.querySelector(`[data-np-index="${i}"]`);
            if (!el || !npStrip.pixels[i]) continue;
            const p = npStrip.pixels[i];
            el.setAttribute('fill', `rgb(${p.r},${p.g},${p.b})`);
            el.setAttribute('stroke', p.r + p.g + p.b > 30 ? '#fff3' : '#333');
        }
    }

    requestAnimationFrame(renderLoop);
}

// ── Tab key in editor ──
$editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
        e.preventDefault();
        const start = $editor.selectionStart;
        $editor.value = $editor.value.substring(0, start) + '    ' + $editor.value.substring($editor.selectionEnd);
        $editor.selectionStart = $editor.selectionEnd = start + 4;
    }
});

// ── Boot ──
init().catch(err => {
    $status.textContent = 'Error: ' + err.message;
    $loading.textContent = 'Error: ' + err.message;
    console.error(err);
});
</script>
</body>
</html>
