<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CircuitPython — Browser Board</title>
<style>
:root {
    --bg: #1e1e2e;
    --surface: #282838;
    --border: #3e3e5e;
    --text: #cdd6f4;
    --dim: #6c7086;
    --accent: #89b4fa;
    --green: #a6e3a1;
    --red: #f38ba8;
    --yellow: #f9e2af;
    --font: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr 1fr;
    gap: 1px;
}

/* ── Header ── */
header {
    grid-column: 1 / -1;
    background: var(--surface);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
}
header h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
header .status { color: var(--dim); font-size: 12px; margin-left: auto; }

/* ── Panels ── */
.panel {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.panel-title {
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
}
.panel-title .actions { margin-left: auto; display: flex; gap: 4px; }

/* ── Board panel ── */
#board-panel { grid-column: 1; grid-row: 2; }
#board-canvas { flex: 1; min-height: 0; }
#board-svg { width: 100%; height: 100%; }

/* ── Editor panel ── */
#editor-panel { grid-column: 2; grid-row: 2; }
#editor {
    flex: 1; resize: none;
    background: var(--bg); color: var(--text);
    font-family: var(--font); font-size: 13px; line-height: 1.5;
    padding: 8px 12px; border: none; outline: none;
    tab-size: 4; min-height: 0;
}

/* ── Console panel ── */
#console-panel { grid-column: 1 / -1; grid-row: 3; }
#console-body { flex: 1; min-height: 0; position: relative; }

#display-wrap {
    position: absolute; inset: 0;
    display: flex; justify-content: center; align-items: center;
    background: #000;
}
#display-wrap:focus { outline: 1px solid var(--accent); outline-offset: -1px; }
#display-canvas { image-rendering: pixelated; max-width: 100%; max-height: 100%; }

#text-output {
    position: absolute; inset: 0;
    font-family: var(--font); font-size: 13px;
    padding: 8px 12px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
    color: var(--text); background: var(--surface);
}

/* View toggle */
#console-body[data-view="display"] #display-wrap { display: flex; }
#console-body[data-view="display"] #text-output { display: none; }
#console-body[data-view="text"] #display-wrap { display: none; }
#console-body[data-view="text"] #text-output { display: block; }

/* ── Loading overlay ── */
#loading-overlay {
    grid-column: 1 / -1; grid-row: 2 / -1;
    display: flex; justify-content: center; align-items: center;
    background: var(--bg); color: var(--dim); font-size: 14px;
    z-index: 10;
}
#loading-overlay.hidden { display: none; }

/* ── Misc ── */
.setting {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--dim); cursor: pointer; user-select: none;
}
.setting input[type="checkbox"] { accent-color: var(--accent); }

button {
    background: var(--border); color: var(--text); border: none;
    padding: 3px 10px; border-radius: 3px;
    font-family: var(--font); font-size: 11px; cursor: pointer;
}
button:hover { background: var(--accent); color: var(--bg); }
button.danger:hover { background: var(--red); }
button.primary { background: var(--accent); color: var(--bg); }

.pin-circle { transition: fill 0.1s; }
.pin-label {
    font-size: 9px; fill: var(--dim); text-anchor: middle;
    pointer-events: none; font-family: var(--font);
}
.neopixel-led { transition: fill 0.05s; filter: url(#neopixel-glow); }
</style>
</head>
<body>

<header>
    <h1>CircuitPython</h1>
    <span id="board-name"></span>
    <label class="setting">
        <input type="checkbox" id="opt-verbose"> Verbose
    </label>
    <span class="status" id="status">Loading</span>
</header>

<div id="loading-overlay">Loading CircuitPython WASM, please wait...</div>

<!-- Board -->
<div class="panel" id="board-panel">
    <div class="panel-title">
        Board
        <div class="actions">
            <button id="btn-a" title="Press Button A">BTN A</button>
            <button id="btn-b" title="Press Button B">BTN B</button>
        </div>
    </div>
    <div id="board-canvas">
        <svg id="board-svg" viewBox="0 0 400 220" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
</div>

<!-- Editor -->
<div class="panel" id="editor-panel">
    <div class="panel-title">
        code.py
        <div class="actions">
            <button id="btn-run" class="primary" title="Save & Run (Ctrl+S)">Run</button>
            <button id="btn-repl" title="Enter REPL">REPL</button>
            <button id="btn-stop" class="danger" title="Stop & Reset">Stop</button>
        </div>
    </div>
    <textarea id="editor" spellcheck="false"></textarea>
</div>

<!-- Console -->
<div class="panel" id="console-panel">
    <div class="panel-title">
        <button id="btn-view-display" class="primary">Display</button>
        <button id="btn-view-text">Serial</button>
        <div class="actions">
            <button id="btn-clear">Clear</button>
        </div>
    </div>
    <div id="console-body" data-view="display">
        <div id="display-wrap" tabindex="0">
            <canvas id="display-canvas" width="480" height="360"></canvas>
        </div>
        <div id="text-output"></div>
    </div>
</div>

<script type="module">
import { CircuitPython } from './js/circuitpython.mjs';
import { BoardAdapter, loadBoardAdapter } from './js/board-adapter.mjs';

// ── DOM ──
const $status    = document.getElementById('status');
const $boardName = document.getElementById('board-name');
const $text      = document.getElementById('text-output');
const $editor    = document.getElementById('editor');
const $svg       = document.getElementById('board-svg');
const $console   = document.getElementById('console-body');
const $canvas    = document.getElementById('display-canvas');
const $loading   = document.getElementById('loading-overlay');
const $display   = document.getElementById('display-wrap');

// ── State ──
let board   = null;
let adapter = null;
let mode    = 'loading';   // loading | ready | code | repl

// ── Init ──
async function init() {
    adapter = await loadBoardAdapter(
        'boards/wasm_browser/definition.json',
        'boards/wasm_browser/magic.json',
    );
    $boardName.textContent = adapter.displayName;

    board = await CircuitPython.create({
        wasmUrl:       'build-browser/circuitpython.wasm',
        canvas:        $canvas,
        persist:       true,
        autoLifecycle: false,   // JS drives execution, not runBoardLifecycle
        onStdout: (text) => {
            $text.textContent += text;
            $text.scrollTop = $text.scrollHeight;
        },
        onStderr: (text) => {
            if (text.startsWith('[sup]') && !$verbose.checked) return;
            $text.textContent += text;
            $text.scrollTop = $text.scrollHeight;
        },
        onCodeDone: () => {
            // code.py finished — stay on display, show status
            setMode('ready');
        },
    });

    board._exports.cp_set_debug(0);

    // Populate editor from MEMFS (seeded from IDB or default)
    const codePy = board._wasi.readFile('/CIRCUITPY/code.py');
    if (codePy) {
        $editor.value = new TextDecoder().decode(codePy);
    }

    renderBoardSvg();
    $loading.classList.add('hidden');
    setMode('ready');

    // Render loop — board visualization (SVG pins/neopixels)
    requestAnimationFrame(renderLoop);
}

// ── Mode management ──
function setMode(m) {
    mode = m;
    const labels = { loading: 'Loading', ready: 'Ready', code: 'Running', repl: 'REPL' };
    $status.textContent = labels[m] || m;
}

// ── Actions ──

function startCode() {
    if (!board) return;
    board.stop();
    $text.textContent = '';
    // Write editor → MEMFS (persists to IDB automatically)
    const enc = new TextEncoder();
    board._wasi.writeFile('/CIRCUITPY/code.py', enc.encode($editor.value));
    board.execFile('/code.py');
    setMode('code');
    setView('display');
}

function startRepl() {
    if (!board) return;
    board.stop();
    $text.textContent = '';
    // Show REPL prompt on the displayio terminal
    board._readline.showPrompt();
    setMode('repl');
    setView('display');
    $display.focus();
}

function stopAll() {
    if (!board) return;
    board.stop();
    setMode('ready');
}

// ── Event wiring ──
document.getElementById('btn-run').addEventListener('click', startCode);
document.getElementById('btn-repl').addEventListener('click', startRepl);
document.getElementById('btn-stop').addEventListener('click', stopAll);

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        startCode();
    }
});

// ── Verbose ──
const $verbose = document.getElementById('opt-verbose');
$verbose.addEventListener('change', () => {
    if (board) board._exports.cp_set_debug($verbose.checked ? 1 : 0);
});

// ── View toggle ──
function setView(view) {
    $console.dataset.view = view;
    document.getElementById('btn-view-display').classList.toggle('primary', view === 'display');
    document.getElementById('btn-view-text').classList.toggle('primary', view === 'text');
}
document.getElementById('btn-view-display').addEventListener('click', () => setView('display'));
document.getElementById('btn-view-text').addEventListener('click', () => setView('text'));
document.getElementById('btn-clear').addEventListener('click', () => { $text.textContent = ''; });

// ── Board buttons ──
function setupButton(id, pin) {
    const el = document.getElementById(id);
    el.addEventListener('mousedown', () => adapter?.setInput(board, pin, false));
    el.addEventListener('mouseup',   () => adapter?.setInput(board, pin, true));
    el.addEventListener('mouseleave',() => adapter?.setInput(board, pin, true));
}
setupButton('btn-a', 'BUTTON_A');
setupButton('btn-b', 'BUTTON_B');

// ── Tab key in editor ──
$editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
        e.preventDefault();
        const s = $editor.selectionStart;
        $editor.value = $editor.value.substring(0, s) + '    ' + $editor.value.substring($editor.selectionEnd);
        $editor.selectionStart = $editor.selectionEnd = s + 4;
    }
});

// ── Board SVG ──
function renderBoardSvg() {
    if (!adapter) return;
    const ns = 'http://www.w3.org/2000/svg';

    // NeoPixel glow filter
    const defs = document.createElementNS(ns, 'defs');
    const filter = document.createElementNS(ns, 'filter');
    filter.setAttribute('id', 'neopixel-glow');
    filter.setAttribute('x', '-50%'); filter.setAttribute('y', '-50%');
    filter.setAttribute('width', '200%'); filter.setAttribute('height', '200%');
    const blur = document.createElementNS(ns, 'feGaussianBlur');
    blur.setAttribute('in', 'SourceGraphic'); blur.setAttribute('stdDeviation', '3');
    blur.setAttribute('result', 'blur');
    filter.appendChild(blur);
    const merge = document.createElementNS(ns, 'feMerge');
    const m1 = document.createElementNS(ns, 'feMergeNode'); m1.setAttribute('in', 'blur');
    const m2 = document.createElementNS(ns, 'feMergeNode'); m2.setAttribute('in', 'SourceGraphic');
    merge.appendChild(m1); merge.appendChild(m2);
    filter.appendChild(merge); defs.appendChild(filter); $svg.appendChild(defs);

    // Board background
    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('width', '400'); bg.setAttribute('height', '220');
    bg.setAttribute('rx', '8'); bg.setAttribute('fill', '#1a3a2a');
    bg.setAttribute('stroke', '#2a5a3a'); bg.setAttribute('stroke-width', '2');
    $svg.appendChild(bg);

    // Board title
    const title = document.createElementNS(ns, 'text');
    title.setAttribute('x', '200'); title.setAttribute('y', '115');
    title.setAttribute('text-anchor', 'middle'); title.setAttribute('fill', '#3a6a4a');
    title.setAttribute('font-size', '12'); title.setAttribute('font-family', 'var(--font)');
    title.textContent = adapter.boardName.toUpperCase();
    $svg.appendChild(title);

    // Pins
    for (const pin of adapter.pins) {
        const v = pin.visual;
        if (!v) continue;
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('data-pin', pin.name);

        const circle = document.createElementNS(ns, 'circle');
        circle.setAttribute('cx', v.x); circle.setAttribute('cy', v.y);
        circle.setAttribute('r', v.side === 'internal' ? 8 : 6);
        circle.setAttribute('fill', '#333'); circle.setAttribute('stroke', '#555');
        circle.setAttribute('stroke-width', '1');
        circle.classList.add('pin-circle');
        g.appendChild(circle);

        const label = document.createElementNS(ns, 'text');
        label.setAttribute('x', v.x);
        label.setAttribute('y', v.side === 'bottom' ? v.y + 16 : v.y - 10);
        label.classList.add('pin-label');
        label.textContent = pin.displayName || pin.name;
        g.appendChild(label);

        if (pin.capabilities.digital && v.side === 'internal') {
            g.style.cursor = 'pointer';
            g.addEventListener('mousedown', () => adapter?.setInput(board, pin.name, false));
            g.addEventListener('mouseup',   () => adapter?.setInput(board, pin.name, true));
            g.addEventListener('mouseleave',() => adapter?.setInput(board, pin.name, true));
        }
        $svg.appendChild(g);
    }

    // NeoPixels
    const npPin = adapter.resolvePin('NEOPIXEL');
    if (npPin) {
        for (let i = 0; i < 10; i++) {
            const led = document.createElementNS(ns, 'circle');
            led.setAttribute('cx', 200 + (i - 4.5) * 18);
            led.setAttribute('cy', 160); led.setAttribute('r', 7);
            led.setAttribute('fill', '#111'); led.setAttribute('stroke', '#333');
            led.setAttribute('stroke-width', '1');
            led.classList.add('neopixel-led');
            led.setAttribute('data-np-index', i);
            $svg.appendChild(led);
        }
    }

    // Power pins
    if (adapter.power) {
        for (const p of [...(adapter.power.threeVolt||[]), ...(adapter.power.fiveVolt||[]), ...(adapter.power.ground||[])]) {
            const lbl = document.createElementNS(ns, 'text');
            lbl.setAttribute('x', p.x);
            lbl.setAttribute('y', p.label === 'GND' ? (p.y > 100 ? p.y + 16 : p.y - 10) : p.y - 10);
            lbl.classList.add('pin-label');
            lbl.setAttribute('fill', p.label === 'GND' ? '#666' : (p.label === '3V3' ? 'var(--yellow)' : 'var(--red)'));
            lbl.textContent = p.label;
            $svg.appendChild(lbl);
        }
    }
}

// ── Render loop (board visualization + cursor) ──
function renderLoop() {
    if (board && adapter) {
        const snap = adapter.getSnapshot(board);

        // Pin state
        for (const [name, state] of Object.entries(snap.pins)) {
            const g = $svg.querySelector(`[data-pin="${name}"]`);
            if (!g) continue;
            const c = g.querySelector('.pin-circle');
            if (!c) continue;
            if (!state.gpio?.enabled) {
                c.setAttribute('fill', '#333'); c.setAttribute('stroke', '#555');
            } else if (state.gpio.direction === 1) {
                c.setAttribute('fill', state.gpio.value ? '#a6e3a1' : '#45475a');
                c.setAttribute('stroke', state.gpio.value ? '#74c7a0' : '#555');
            } else {
                c.setAttribute('fill', state.gpio.value ? '#89b4fa' : '#313244');
                c.setAttribute('stroke', '#555');
            }
        }

        // NeoPixels
        const np = snap.neopixels['NEOPIXEL'];
        if (np) {
            for (let i = 0; i < np.numPixels && i < 10; i++) {
                const el = $svg.querySelector(`[data-np-index="${i}"]`);
                if (!el || !np.pixels[i]) continue;
                const p = np.pixels[i];
                el.setAttribute('fill', `rgb(${p.r},${p.g},${p.b})`);
                el.setAttribute('stroke', p.r + p.g + p.b > 30 ? '#fff3' : '#333');
            }
        }

        // Cursor: show only in REPL mode when VM is ready (waiting for input)
        if (board._display && mode === 'repl' && board.state === 'ready') {
            board._display.drawCursor();
        }
    }

    requestAnimationFrame(renderLoop);
}

// ── Boot ──
init().catch(err => {
    $status.textContent = 'Error: ' + err.message;
    $loading.textContent = 'Error: ' + err.message;
    console.error(err);
});
</script>
</body>
</html>
