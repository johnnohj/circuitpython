<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chassis — MEMFS-in-Linear-Memory Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
h1 { color: #7fdbca; margin-bottom: 8px; font-size: 1.4em; }
h2 { color: #c792ea; margin: 16px 0 8px; font-size: 1.1em; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 900px; }
.panel { background: #16213e; border-radius: 8px; padding: 16px; }
.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; font-size: 0.85em; }
.stat-label { color: #888; }
.stat-value { color: #7fdbca; font-family: monospace; }

/* Pin grid */
.pin-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
.pin {
    width: 36px; height: 36px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75em; font-family: monospace; cursor: pointer;
    transition: background 0.15s;
}
.pin.unclaimed { background: #2a2a4a; color: #555; }
.pin.input { background: #1b3a4b; color: #7fdbca; border: 1px solid #3a6a7a; }
.pin.output { background: #3a1b4b; color: #c792ea; border: 1px solid #6a3a7a; }
.pin.high { box-shadow: 0 0 8px rgba(127, 219, 202, 0.5); }

/* Controls */
.controls { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
button {
    background: #0f3460; color: #e0e0e0; border: 1px solid #3a5a8a;
    padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em;
}
button:hover { background: #1a4a7a; }
button.active { background: #2a6a3a; border-color: #4a8a5a; }
select, input[type=number] {
    background: #0f3460; color: #e0e0e0; border: 1px solid #3a5a8a;
    padding: 4px 8px; border-radius: 4px; font-size: 0.85em;
}

/* Log */
#log {
    background: #0a0a1a; border-radius: 4px; padding: 8px;
    font-family: monospace; font-size: 0.8em; height: 180px;
    overflow-y: auto; white-space: pre-wrap; color: #aaa;
    border: 1px solid #2a2a4a;
}

/* Memory viewer */
#memview {
    background: #0a0a1a; border-radius: 4px; padding: 8px;
    font-family: monospace; font-size: 0.75em; height: 120px;
    overflow-y: auto; color: #7fdbca; border: 1px solid #2a2a4a;
}
</style>
</head>
<body>

<h1>Port Chassis — MEMFS-in-Linear-Memory</h1>

<div class="grid">

<!-- Left column: GPIO pins + controls -->
<div class="panel">
    <h2>GPIO Pins</h2>
    <div class="controls">
        <span style="color:#888; font-size:0.8em">Click unclaimed pin to claim as input. Click input pin to toggle value.</span>
    </div>
    <div id="pin-grid" class="pin-grid"></div>

    <h2>Controls</h2>
    <div class="controls">
        <button id="btn-claim-out">Claim pin as output</button>
        <input id="pin-num" type="number" min="0" max="63" value="13" style="width:50px">
        <button id="btn-release-all">Release all</button>
        <button id="btn-toggle-loop" class="active">Frame loop</button>
    </div>
    <div class="controls">
        <button id="btn-step">Step 1 frame</button>
        <span style="color:#888; font-size:0.8em; margin-top:4px">Budget:</span>
        <input id="budget-ms" type="number" min="1" max="33" value="13" style="width:50px">
        <span style="color:#888; font-size:0.8em">ms</span>
    </div>
</div>

<!-- Right column: Stats + memory view -->
<div class="panel">
    <h2>Frame Stats</h2>
    <div class="stats" id="stats">
        <span class="stat-label">Frame:</span><span class="stat-value" id="s-frame">0</span>
        <span class="stat-label">Status:</span><span class="stat-value" id="s-status">-</span>
        <span class="stat-label">Elapsed:</span><span class="stat-value" id="s-elapsed">-</span>
        <span class="stat-label">Budget:</span><span class="stat-value" id="s-budget">-</span>
        <span class="stat-label">Flags:</span><span class="stat-value" id="s-flags">-</span>
        <span class="stat-label">Changes:</span><span class="stat-value" id="s-changes">-</span>
        <span class="stat-label">Claimed:</span><span class="stat-value" id="s-claimed">-</span>
        <span class="stat-label">FPS:</span><span class="stat-value" id="s-fps">-</span>
    </div>

    <h2>MEMFS Memory View</h2>
    <div class="controls">
        <select id="memview-select">
            <option value="/port/state">/port/state</option>
            <option value="/hal/gpio">/hal/gpio</option>
            <option value="/hal/analog">/hal/analog</option>
            <option value="/port/event_ring">/port/event_ring</option>
            <option value="/hal/serial/rx">/hal/serial/rx</option>
            <option value="/hal/serial/tx">/hal/serial/tx</option>
        </select>
    </div>
    <div id="memview"></div>

    <h2>Log</h2>
    <div id="log"></div>
</div>

</div>

<script type="module">
import { WasiChassis } from './wasi-chassis.js';

// Constants
const GPIO_SLOT_SIZE = 12;
const GPIO_OFF_ENABLED = 0, GPIO_OFF_DIRECTION = 1, GPIO_OFF_VALUE = 2;
const GPIO_OFF_PULL = 3, GPIO_OFF_ROLE = 4, GPIO_OFF_FLAGS = 5;
const GPIO_OFF_CATEGORY = 6, GPIO_OFF_LATCHED = 7;
const ROLE_UNCLAIMED = 0, ROLE_DIGITAL_IN = 1, ROLE_DIGITAL_OUT = 2;
const FLAG_JS_WROTE = 0x01;
const EVT_GPIO_CHANGE = 0x01;
const EVENT_SIZE = 8, RING_HEADER_SIZE = 8;

const NUM_PINS = 16;  // Show first 16 pins in UI
const RC_NAMES = ['DONE', 'YIELD', 'EVENTS', 'ERROR'];

const log = document.getElementById('log');
function logMsg(msg) {
    log.textContent += msg + '\n';
    log.scrollTop = log.scrollHeight;
}

// Init WASI + WASM
const wasi = new WasiChassis({
    onStdout: logMsg,
    onStderr: logMsg,
});

const resp = await fetch('./build/chassis.wasm');
const wasmBytes = await resp.arrayBuffer();
const { instance } = await WebAssembly.instantiate(wasmBytes, wasi.getImports());
wasi.setInstance(instance);

const exports = instance.exports;
const mem = exports.memory;

exports.chassis_init();
logMsg('Chassis initialized');

const ringInfo = wasi.getAliasInfo('/port/event_ring');

// ── Pin grid ──
const pinGrid = document.getElementById('pin-grid');
for (let i = 0; i < NUM_PINS; i++) {
    const el = document.createElement('div');
    el.className = 'pin unclaimed';
    el.textContent = i;
    el.dataset.pin = i;
    el.addEventListener('click', () => onPinClick(i));
    pinGrid.appendChild(el);
}

function onPinClick(pin) {
    const gpioView = wasi.readFile('/hal/gpio');
    const offset = pin * GPIO_SLOT_SIZE;
    const role = gpioView[offset + GPIO_OFF_ROLE];

    if (role === ROLE_UNCLAIMED) {
        // Claim as input
        exports.chassis_claim_pin(pin, ROLE_DIGITAL_IN);
        logMsg(`Claimed pin ${pin} as DIGITAL_IN`);
    } else if (role === ROLE_DIGITAL_IN) {
        // Toggle input value (simulate button press)
        const cur = gpioView[offset + GPIO_OFF_VALUE];
        const next = cur ? 0 : 1;
        gpioView[offset + GPIO_OFF_VALUE] = next;
        pushGpioEvent(pin);
        logMsg(`Pin ${pin} input → ${next}`);
    } else if (role === ROLE_DIGITAL_OUT) {
        // Toggle output
        const cur = gpioView[offset + GPIO_OFF_VALUE];
        exports.chassis_write_pin(pin, cur ? 0 : 1);
        logMsg(`Pin ${pin} output → ${cur ? 0 : 1}`);
    }
}

function pushGpioEvent(pin) {
    const dv = new DataView(mem.buffer);
    const writeHead = dv.getUint32(ringInfo.ptr, true);
    const evtOffset = ringInfo.ptr + RING_HEADER_SIZE + writeHead;
    dv.setUint8(evtOffset + 0, EVT_GPIO_CHANGE);
    dv.setUint8(evtOffset + 1, pin);
    dv.setUint16(evtOffset + 2, 0, true);
    dv.setUint32(evtOffset + 4, 0, true);
    dv.setUint32(ringInfo.ptr, writeHead + EVENT_SIZE, true);
}

// ── Controls ──
document.getElementById('btn-claim-out').addEventListener('click', () => {
    const pin = parseInt(document.getElementById('pin-num').value);
    const ok = exports.chassis_claim_pin(pin, ROLE_DIGITAL_OUT);
    logMsg(`Claim pin ${pin} as DIGITAL_OUT: ${ok ? 'ok' : 'fail'}`);
});

document.getElementById('btn-release-all').addEventListener('click', () => {
    exports.chassis_release_all();
    logMsg('Released all pins');
});

let loopRunning = true;
document.getElementById('btn-toggle-loop').addEventListener('click', (e) => {
    loopRunning = !loopRunning;
    e.target.classList.toggle('active', loopRunning);
    e.target.textContent = loopRunning ? 'Frame loop' : 'Paused';
    if (loopRunning) requestAnimationFrame(frame);
});

document.getElementById('btn-step').addEventListener('click', () => {
    runFrame(performance.now());
});

// ── Frame loop ──
let lastFpsTime = performance.now();
let fpsCount = 0;
let fpsDisplay = 0;

function runFrame(now) {
    const budget = parseFloat(document.getElementById('budget-ms').value) || 13;
    exports.chassis_frame(now, budget);
    updateUI();
}

function frame(now) {
    runFrame(now);
    fpsCount++;
    if (now - lastFpsTime >= 1000) {
        fpsDisplay = fpsCount;
        fpsCount = 0;
        lastFpsTime = now;
    }
    if (loopRunning) requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ── UI update ──
function updateUI() {
    wasi.refreshViews();
    const gpioView = wasi.readFile('/hal/gpio');
    const stateView = wasi.readFile('/port/state');
    const stateDv = new DataView(stateView.buffer, stateView.byteOffset, stateView.byteLength);

    // Update pin grid
    for (let i = 0; i < NUM_PINS; i++) {
        const el = pinGrid.children[i];
        const offset = i * GPIO_SLOT_SIZE;
        const role = gpioView[offset + GPIO_OFF_ROLE];
        const value = gpioView[offset + GPIO_OFF_VALUE];
        const latched = gpioView[offset + GPIO_OFF_LATCHED];

        el.className = 'pin';
        if (role === ROLE_UNCLAIMED) {
            el.classList.add('unclaimed');
        } else if (role === ROLE_DIGITAL_IN) {
            el.classList.add('input');
            if (latched) el.classList.add('high');
        } else if (role === ROLE_DIGITAL_OUT) {
            el.classList.add('output');
            if (value) el.classList.add('high');
        } else {
            el.classList.add('input');
        }
        el.textContent = `${i}`;
    }

    // Update stats
    const fc = stateDv.getUint32(8, true);
    const status = stateDv.getUint32(24, true);
    const elapsed = stateDv.getUint32(20, true);
    const budget = stateDv.getUint32(16, true);
    const flags = stateDv.getUint32(28, true);

    // Count claimed (read from MEMFS directly)
    let claimed = 0;
    for (let i = 0; i < NUM_PINS; i++) {
        if (gpioView[i * GPIO_SLOT_SIZE + GPIO_OFF_ROLE] !== ROLE_UNCLAIMED) claimed++;
    }

    // Read change_count from port_mem (after serial_tx in the struct)
    const portAddr = exports.chassis_memory_addr();
    const portDv = new DataView(mem.buffer);
    const changeCountOffset = portAddr + 9784 - 20 + 16; // approximate
    // Instead, just use the flags for now

    document.getElementById('s-frame').textContent = fc;
    document.getElementById('s-status').textContent = RC_NAMES[status] || status;
    document.getElementById('s-elapsed').textContent = `${elapsed}µs`;
    document.getElementById('s-budget').textContent = `${budget}µs`;
    document.getElementById('s-flags').textContent = `0x${flags.toString(16)}`;
    document.getElementById('s-claimed').textContent = claimed;
    document.getElementById('s-fps').textContent = fpsDisplay;

    // Update memory viewer
    updateMemView();
}

function updateMemView() {
    const path = document.getElementById('memview-select').value;
    const data = wasi.readFile(path);
    if (!data) return;

    const el = document.getElementById('memview');
    let hex = '';
    const maxBytes = Math.min(data.length, 128);
    for (let i = 0; i < maxBytes; i += 16) {
        const addr = i.toString(16).padStart(4, '0');
        let line = `${addr}:`;
        let ascii = '';
        for (let j = 0; j < 16 && i + j < maxBytes; j++) {
            const b = data[i + j];
            line += ` ${b.toString(16).padStart(2, '0')}`;
            ascii += (b >= 32 && b < 127) ? String.fromCharCode(b) : '.';
        }
        hex += `${line.padEnd(54)} ${ascii}\n`;
    }
    if (data.length > maxBytes) {
        hex += `... (${data.length - maxBytes} more bytes)\n`;
    }
    el.textContent = hex;
}

document.getElementById('memview-select').addEventListener('change', updateMemView);
</script>

</body>
</html>
