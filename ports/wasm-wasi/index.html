<!DOCTYPE html>
<html>
<head>
    <title>CircuitPython WASI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <style>
        body { margin: 0; background: #1a1a2e; color: #e0e0e0; font-family: monospace; }
        #header { padding: 8px 16px; background: #16213e; border-bottom: 1px solid #333; }
        #header h1 { margin: 0; font-size: 16px; color: #4ecca3; }
        #header span { font-size: 12px; color: #888; }
        #terminal { padding: 8px; }
        #controls { padding: 8px 16px; display: flex; gap: 8px; }
        button { background: #4ecca3; color: #1a1a2e; border: none; padding: 6px 16px;
                 border-radius: 4px; cursor: pointer; font-family: monospace; }
        button:hover { background: #3ba88f; }
        textarea { width: 100%; height: 120px; background: #0f3460; color: #e0e0e0;
                   border: 1px solid #333; padding: 8px; font-family: monospace;
                   resize: vertical; }
    </style>
</head>
<body>
    <div id="header">
        <h1>CircuitPython WASI</h1>
        <span>Headless VM &middot; OPFS state &middot; No Emscripten</span>
    </div>
    <div id="controls">
        <button id="run-btn">Run</button>
        <span id="status" style="line-height:32px;color:#888">Ready</span>
    </div>
    <textarea id="code">print("Hello from CircuitPython WASI!")
a, b = 0, 1
for i in range(10):
    a, b = b, a + b
print("fib(10) =", a)
print([x*x for x in range(6)])
</textarea>
    <div id="terminal"></div>

    <script type="module">
        import { Terminal } from 'https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/+esm';
        import { FitAddon } from 'https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/+esm';

        const term = new Terminal({
            theme: { background: '#1a1a2e' },
            fontSize: 14,
            fontFamily: 'monospace',
            cursorBlink: true,
        });
        const fitAddon = new FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();
        window.addEventListener('resize', () => fitAddon.fit());

        term.writeln('\x1b[36mCircuitPython WASI Terminal\x1b[0m');
        term.writeln('Press "Run" to execute code.\r\n');

        const runBtn = document.getElementById('run-btn');
        const codeArea = document.getElementById('code');
        const statusEl = document.getElementById('status');

        runBtn.addEventListener('click', () => {
            const code = codeArea.value;
            term.writeln('\x1b[33m--- Running ---\x1b[0m');
            statusEl.textContent = 'Running...';
            runBtn.disabled = true;

            const worker = new Worker('./js/executor-worker.js', { type: 'module' });

            worker.onmessage = (e) => {
                const msg = e.data;
                if (msg.type === 'stdout') {
                    // Convert \n to \r\n for terminal
                    term.write(msg.data.replace(/\n/g, '\r\n'));
                } else if (msg.type === 'stderr') {
                    term.write('\x1b[31m' + msg.data.replace(/\n/g, '\r\n') + '\x1b[0m');
                } else if (msg.type === 'exit') {
                    term.writeln('\r\n\x1b[33m--- Exit: ' + msg.code + ' ---\x1b[0m');
                    statusEl.textContent = 'Done (exit ' + msg.code + ')';
                    runBtn.disabled = false;
                    worker.terminate();
                } else if (msg.type === 'error') {
                    term.writeln('\r\n\x1b[31mError: ' + msg.message + '\x1b[0m');
                    statusEl.textContent = 'Error';
                    runBtn.disabled = false;
                    worker.terminate();
                }
            };

            worker.onerror = (e) => {
                term.writeln('\r\n\x1b[31mWorker error: ' + e.message + '\x1b[0m');
                statusEl.textContent = 'Error';
                runBtn.disabled = false;
            };

            worker.postMessage({
                type: 'init',
                wasmUrl: '/build-opfs/circuitpython.wasm',
                code: code,
            });
        });
    </script>
</body>
</html>
